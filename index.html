<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bump2Tots Evaluator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [stage, setStage] = useState('setup');
            const [evaluatorName, setEvaluatorName] = useState('');
            const [specialty, setSpecialty] = useState('');
            const [questions, setQuestions] = useState(null);
            const [currentQ, setCurrentQ] = useState(0);
            const [currentM, setCurrentM] = useState(0);
            const [ratings, setRatings] = useState({});

            const handleUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const csv = ev.target.result;
                    const lines = csv.split('\n').filter(l => l.trim());
                    const header = lines[0].split(',').map(h => h.trim());
                    
                    const qIdx = header.findIndex(h => h.includes('Question'));
                    const sIdx = header.findIndex(h => h.includes('Speciality'));
                    const gptIdx = header.findIndex(h => h.includes('GPT'));
                    const gemIdx = header.findIndex(h => h.includes('Gemini'));
                    const cIdx = header.findIndex(h => h.includes('Claude'));
                    const bIdx = header.findIndex(h => h.includes('Bump2Tots'));

                    const parsed = lines.slice(1).map((line, idx) => {
                        const cells = line.split(',');
                        const models = [
                            { name: 'ChatGPT', text: cells[gptIdx] || '' },
                            { name: 'Gemini', text: cells[gemIdx] || '' },
                            { name: 'Claude', text: cells[cIdx] || '' },
                            { name: 'Bump2Tots', text: cells[bIdx] || '' }
                        ];
                        models.sort(() => Math.random() - 0.5);
                        return {
                            qNum: idx + 1,
                            question: cells[qIdx] || '',
                            spec: cells[sIdx] || '',
                            models: models.map((m, i) => ({
                                letter: String.fromCharCode(65 + i),
                                name: m.name,
                                text: m.text
                            }))
                        };
                    });
                    setQuestions(parsed);
                };
                reader.readAsText(file);
            };

            if (stage === 'setup') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6">
                        <div className="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8">
                            <h1 className="text-3xl font-bold text-gray-900 mb-6">Bump2Tots Evaluator</h1>
                            
                            {!questions ? (
                                <label className="block">
                                    <div className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg cursor-pointer text-center">
                                        📁 Upload CSV
                                    </div>
                                    <input type="file" accept=".csv" onChange={handleUpload} className="hidden" />
                                </label>
                            ) : (
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-900 mb-2">Your Name</label>
                                        <input
                                            type="text"
                                            placeholder="Dr. Name"
                                            value={evaluatorName}
                                            onChange={(e) => setEvaluatorName(e.target.value)}
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-900 mb-3">Specialty</label>
                                        {['OB/MFM', 'Peds/Neo'].map(s => (
                                            <button
                                                key={s}
                                                onClick={() => setSpecialty(s)}
                                                className={`w-full py-2 px-4 mb-2 rounded-lg font-bold ${
                                                    specialty === s ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-900'
                                                }`}
                                            >
                                                {s} ({questions.filter(q => q.spec === s || (s === 'Peds/Neo' && q.spec === 'peds/neo')).length})
                                            </button>
                                        ))}
                                    </div>
                                    <button
                                        onClick={() => evaluatorName && specialty && setStage('eval')}
                                        disabled={!evaluatorName || !specialty}
                                        className="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg disabled:bg-gray-400"
                                    >
                                        Start
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (stage === 'eval' && questions) {
                const filtered = questions.filter(q => q.spec === specialty || (specialty === 'Peds/Neo' && q.spec === 'peds/neo'));
                const q = filtered[currentQ];
                const m = q.models[currentM];
                const key = `${currentQ}_${currentM}`;
                const rating = ratings[key] || {};

                const next = () => {
                    if (currentM < 3) setCurrentM(currentM + 1);
                    else if (currentQ < filtered.length - 1) {
                        setCurrentQ(currentQ + 1);
                        setCurrentM(0);
                    }
                };

                const save = (dim, val) => {
                    setRatings(prev => ({
                        ...prev,
                        [key]: { ...prev[key], [dim]: val }
                    }));
                };

                const dims = ['accuracy', 'clarity', 'safety', 'actionability', 'empathy'];

                const export_csv = () => {
                    const rows = filtered.flatMap((q, qi) => 
                        q.models.map((m, mi) => {
                            const r = ratings[`${qi}_${mi}`] || {};
                            return [
                                evaluatorName, specialty, q.qNum, m.name,
                                r.accuracy || '', r.clarity || '', r.safety || '',
                                r.actionability || '', r.empathy || '', r.winner ? 'Yes' : 'No'
                            ];
                        })
                    );
                    const csv = [
                        ['Evaluator', 'Specialty', 'Q#', 'Model', 'Accuracy', 'Clarity', 'Safety', 'Actionability', 'Empathy', 'Winner'],
                        ...rows
                    ].map(r => r.join(',')).join('\n');
                    
                    const blob = new Blob([csv], { type: 'text/csv' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${specialty}_${evaluatorName}.csv`;
                    a.click();
                };

                const isLast = currentQ === filtered.length - 1 && currentM === 3;

                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6">
                        <div className="max-w-3xl mx-auto">
                            <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
                                <h2 className="text-2xl font-bold text-gray-900">Q{currentQ + 1}/{filtered.length} • R{currentM + 1}/4</h2>
                                <p className="text-sm text-gray-600">{evaluatorName} • {specialty}</p>
                            </div>

                            <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
                                <h3 className="font-bold text-lg mb-2">Question</h3>
                                <p className="text-gray-800">{q.question}</p>
                            </div>

                            <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
                                <div className="flex justify-between mb-2">
                                    <h3 className="font-bold text-lg">Response</h3>
                                    <span className="bg-blue-100 text-blue-900 px-2 py-1 rounded text-sm font-bold">{m.name}</span>
                                </div>
                                <div className="bg-gray-50 border border-gray-200 rounded p-4 max-h-80 overflow-y-auto text-sm text-gray-800 whitespace-pre-wrap">
                                    {m.text}
                                </div>
                            </div>

                            <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
                                <h3 className="font-bold text-lg mb-4">Rate</h3>
                                {dims.map(d => (
                                    <div key={d} className="mb-4">
                                        <label className="text-sm font-bold text-gray-900 capitalize">{d}</label>
                                        <div className="flex gap-1 mt-1">
                                            {[1, 2, 3, 4, 5].map(s => (
                                                <button
                                                    key={s}
                                                    onClick={() => save(d, s)}
                                                    className={`flex-1 py-2 rounded font-bold text-sm ${
                                                        rating[d] === s ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-900'
                                                    }`}
                                                >
                                                    {s}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                                <label className="mt-4 flex items-center gap-2 cursor-pointer">
                                    <input
                                        type="checkbox"
                                        checked={rating.winner || false}
                                        onChange={(e) => save('winner', e.target.checked)}
                                    />
                                    <span className="text-sm font-bold text-gray-900">Winner</span>
                                </label>
                            </div>

                            <button
                                onClick={isLast ? export_csv : next}
                                className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg"
                            >
                                {isLast ? '✓ Export Results' : 'Next →'}
                            </button>
                        </div>
                    </div>
                );
            }

            return null;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
