<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bump2Tots Evaluator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="app"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        const e = React.createElement;
        const useState = React.useState;
        function parseCSVProperly(csvText) {
            if (csvText.charCodeAt(0) === 0xFEFF) {
                csvText = csvText.slice(1);
            }
            var rows = [];
            var currentRow = [];
            var currentCell = '';
            var insideQuotes = false;
            for (var i = 0; i < csvText.length; i++) {
                var char = csvText[i];
                var nextChar = csvText[i + 1];
                if (char === '"') {
                    if (insideQuotes && nextChar === '"') {
                        currentCell += '"';
                        i++;
                    } else {
                        insideQuotes = !insideQuotes;
                    }
                } else if (char === ',' && !insideQuotes) {
                    currentRow.push(currentCell.trim());
                    currentCell = '';
                } else if ((char === '\n' || char === '\r') && !insideQuotes) {
                    if (currentCell.length > 0 || currentRow.length > 0) {
                        currentRow.push(currentCell.trim());
                        if (currentRow.some(function(c) { return c.length > 0; })) {
                            rows.push(currentRow);
                        }
                        currentRow = [];
                        currentCell = '';
                    }
                    if (char === '\r' && nextChar === '\n') {
                        i++;
                    }
                } else {
                    currentCell += char;
                }
            }
            if (currentCell.length > 0 || currentRow.length > 0) {
                currentRow.push(currentCell.trim());
                if (currentRow.some(function(c) { return c.length > 0; })) {
                    rows.push(currentRow);
                }
            }
            return rows;
        }
        function VoiceRecorder(props) {
            const [isRecording, setIsRecording] = useState(false);
            const [transcript, setTranscript] = useState(props.value || '');
            const [recognition, setRecognition] = useState(null);
            React.useEffect(function() {
                var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    var recog = new SpeechRecognition();
                    recog.continuous = true;
                    recog.interimResults = true;
                    recog.lang = 'en-US';
                    recog.onresult = function(event) {
                        for (var i = event.resultIndex; i < event.results.length; i++) {
                            var t = event.results[i][0].transcript;
                            if (event.results[i].isFinal) {
                                setTranscript(function(prev) { return prev + ' ' + t; });
                            }
                        }
                    };
                    recog.onerror = function() {
                        setIsRecording(false);
                    };
                    setRecognition(recog);
                }
            }, []);
            function startRecording() {
                if (recognition) {
                    setTranscript('');
                    recognition.start();
                    setIsRecording(true);
                }
            }
            function stopRecording() {
                if (recognition) {
                    recognition.stop();
                    setIsRecording(false);
                    props.onChange(transcript.trim());
                }
            }
            function clearTranscript() {
                setTranscript('');
            }
            return e('div', {className: 'space-y-2'},
                e('div', {className: 'flex gap-2'},
                    e('button', {
                        onClick: isRecording ? stopRecording : startRecording,
                        className: 'flex-1 py-2 px-3 rounded-lg font-bold text-sm transition ' + (isRecording ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-blue-500 hover:bg-blue-600 text-white')
                    }, isRecording ? '⏹️ Stop Recording' : '🎤 Record'),
                    e('button', {
                        onClick: clearTranscript,
                        className: 'py-2 px-3 rounded-lg font-bold text-sm bg-gray-300 hover:bg-gray-400'
                    }, 'Clear')
                ),
                transcript ? e('div', {className: 'bg-blue-50 border border-blue-200 rounded p-2'},
                    e('p', {className: 'text-xs text-gray-600 mb-1'}, 'Transcript:'),
                    e('p', {className: 'text-sm text-gray-800'}, transcript)
                ) : null,
                e('textarea', {
                    value: transcript,
                    onChange: function(e) { setTranscript(e.target.value); props.onChange(e.target.value); },
                    placeholder: 'Or type your clinical insights here...',
                    className: 'w-full px-3 py-2 border border-gray-300 rounded text-sm',
                    rows: 3
                })
            );
        }
        function App() {
            const [stage, setStage] = useState('setup');
            const [name, setName] = useState('');
            const [spec, setSpec] = useState('');
            const [questions, setQuestions] = useState(null);
            const [qIdx, setQIdx] = useState(0);
            const [ratings, setRatings] = useState({});
            const [loading, setLoading] = useState(false);
            function loadCSV() {
                setLoading(true);
                const csvUrl = '/api/csv';
                fetch(csvUrl)
                    .then(r => r.text())
                    .then(csvText => {
                        var rows = parseCSVProperly(csvText);
                        var header = rows[0];
                        var qIdx = -1, sIdx = -1, gIdx = -1, geIdx = -1, cIdx = -1, bIdx = -1, srcIdx = -1;
                        for (var i = 0; i < header.length; i++) {
                            var h = header[i].toLowerCase();
                            if (h.includes('question')) qIdx = i;
                            if (h.includes('speciality')) sIdx = i;
                            if (h.includes('gpt')) gIdx = i;
                            if (h.includes('gemini')) geIdx = i;
                            if (h.includes('claude')) cIdx = i;
                            if (h.includes('bump2tots')) bIdx = i;
                            if (h.includes('sources')) srcIdx = i;
                        }
                        var parsed = rows.slice(1).map(function(cells, idx) {
                            var bump2totsText = cells[bIdx] || '';
                            var sourcesText = cells[srcIdx] || '';
                            var bump2totsWithSources = sourcesText ? bump2totsText + '\n\n**Sources:**\n' + sourcesText : bump2totsText;
                            var models = [
                                { name: 'ChatGPT', text: cells[gIdx] || '' },
                                { name: 'Gemini', text: cells[geIdx] || '' },
                                { name: 'Claude', text: cells[cIdx] || '' },
                                { name: 'Bump2Tots', text: bump2totsWithSources }
                            ];
                            models.sort(function() { return Math.random() - 0.5; });
                            return {
                                qNum: idx + 1,
                                question: cells[qIdx] || '',
                                spec: cells[sIdx] || '',
                                models: models.map(function(m, i) {
                                    return {
                                        letter: String.fromCharCode(65 + i),
                                        name: m.name,
                                        text: m.text
                                    };
                                })
                            };
                        });
                        setQuestions(parsed);
                        setLoading(false);
                    })
                    .catch(err => {
                        alert('Error loading CSV: ' + err.message);
                        setLoading(false);
                    });
            }
            React.useEffect(loadCSV, []);
            if (stage === 'setup') {
                var specs = ['OB/MFM', 'Peds/Neo'];
                return e('div', {className: 'min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6'},
                    e('div', {className: 'max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8'},
                        e('h1', {className: 'text-3xl font-bold text-gray-900 mb-6'}, 'Bump2Tots Evaluator'),
                        loading ? 
                            e('div', {className: 'text-center py-8'},
                                e('p', {className: 'text-lg text-gray-600'}, 'Loading evaluation questions...')
                            )
                        : !questions ?
                            e('div', {className: 'text-center py-8'},
                                e('p', {className: 'text-lg text-red-600'}, 'Error loading questions')
                            )
                        :
                            e('div', {className: 'space-y-6'},
                                e('div', null,
                                    e('label', {className: 'block text-sm font-bold text-gray-900 mb-2'}, 'Your Name'),
                                    e('input', {type: 'text', placeholder: 'Dr. Name', value: name, onChange: function(e) { setName(e.target.value); }, className: 'w-full px-4 py-2 border border-gray-300 rounded-lg'})
                                ),
                                e('div', null,
                                    e('label', {className: 'block text-sm font-bold text-gray-900 mb-3'}, 'Specialty'),
                                    specs.map(function(s) {
                                        var count = questions.filter(function(q) { return (s === 'OB/MFM' && q.spec === 'OB/MFM') || (s === 'Peds/Neo' && (q.spec === 'Peds/Neo' || q.spec === 'peds/neo')); }).length;
                                        return e('button', {key: s, onClick: function() { setSpec(s); }, className: 'w-full py-2 px-4 mb-2 rounded-lg font-bold ' + (spec === s ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-900')}, s + ' (' + count + ')');
                                    })
                                ),
                                e('button', {onClick: function() { if (name && spec) setStage('eval'); else alert('Please enter info'); }, className: 'w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg'}, 'Start')
                            )
                    )
                );
            }
            if (stage === 'eval' && questions) {
                var filtered = questions.filter(function(q) { return (spec === 'OB/MFM' && q.spec === 'OB/MFM') || (spec === 'Peds/Neo' && (q.spec === 'Peds/Neo' || q.spec === 'peds/neo')); });
                if (filtered.length === 0) {
                    return e('div', {className: 'min-h-screen flex items-center justify-center'}, e('div', {className: 'text-2xl font-bold'}, 'No questions found'));
                }
                var q = filtered[qIdx];
                var key = qIdx.toString();
                var qRating = ratings[key] || {};
                function next() {
                    if (qIdx < filtered.length - 1) {
                        setQIdx(qIdx + 1);
                    }
                }
                function save(responseIdx, dim, val) {
                    var newRatings = Object.assign({}, ratings);
                    var qData = Object.assign({}, ratings[key], {});
                    if (!qData.responses) qData.responses = [{}, {}, {}, {}];
                    if (!qData.responses[responseIdx]) qData.responses[responseIdx] = {};
                    qData.responses[responseIdx][dim] = val;
                    newRatings[key] = qData;
                    setRatings(newRatings);
                }
                function saveBest(bestLetter) {
                    var newRatings = Object.assign({}, ratings);
                    var qData = Object.assign({}, ratings[key], {});
                    if (!qData.responses) qData.responses = [{}, {}, {}, {}];
                    qData.best = bestLetter;
                    newRatings[key] = qData;
                    setRatings(newRatings);
                }
                function saveClinicalNote(note) {
                    var newRatings = Object.assign({}, ratings);
                    var qData = Object.assign({}, ratings[key], {});
                    qData.clinicalNote = note;
                    newRatings[key] = qData;
                    setRatings(newRatings);
                }
                function completeEval() {
                    setLoading(true);
                    var rows = [];
                    filtered.forEach(function(q, qi) {
                        q.models.forEach(function(m, mi) {
                            var qData = ratings[qi.toString()] || {};
                            var rData = (qData.responses && qData.responses[mi]) || {};
                            var note = (qData.clinicalNote || '').replace(/"/g, '""');
                            rows.push([name, spec, q.qNum, '"' + q.question.replace(/"/g, '""') + '"', m.name, rData.accuracy || '', rData.clarity || '', rData.safety || '', rData.actionability || '', rData.empathy || '', '"' + note + '"', qData.best === m.letter ? 'Yes' : 'No']);
                        });
                    });
                    var header = ['Evaluator', 'Specialty', 'Question#', 'Question', 'Model', 'Accuracy', 'Clarity', 'Safety', 'Actionability', 'Empathy', 'Clinical Notes', 'Best'];
                    var csv = [header].concat(rows).map(function(r) { return r.join(','); }).join('\n');
                    var blob = new Blob([csv], {type: 'text/csv'});
                    var url = URL.createObjectURL(blob);
                    var a = document.createElement('a');
                    a.href = url;
                    a.download = spec + '_' + name + '_results.csv';
                    a.click();
                    setLoading(false);
                    setStage('complete');
                }
                var isLast = qIdx === filtered.length - 1;
                var total = filtered.length;
                var evaluated = Object.keys(ratings).length;
                var progress = Math.round((evaluated / total) * 100);
                var dims = ['accuracy', 'clarity', 'safety', 'actionability', 'empathy'];
                var ratingLabels = {
                    accuracy: ['Poor', 'Fair', 'Good', 'Very Good', 'Excellent'],
                    clarity: ['Unclear', 'Somewhat Clear', 'Clear', 'Very Clear', 'Crystal Clear'],
                    safety: ['Unsafe', 'Questionable', 'Safe', 'Very Safe', 'Exemplary'],
                    actionability: ['Not Actionable', 'Minimally Actionable', 'Actionable', 'Very Actionable', 'Highly Actionable'],
                    empathy: ['Not Empathetic', 'Somewhat Empathetic', 'Empathetic', 'Very Empathetic', 'Exceptionally Empathetic']
                };
                return e('div', {className: 'min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6'},
                    e('div', {className: 'max-w-full mx-auto px-2 sm:px-4'},
                        e('div', {className: 'bg-white rounded-lg shadow-lg p-6 mb-6'},
                            e('div', {className: 'flex justify-between mb-4'},
                                e('div', null,
                                    e('h2', {className: 'text-2xl font-bold text-gray-900'}, 'Q' + (qIdx + 1) + '/' + total),
                                    e('p', {className: 'text-sm text-gray-600'}, name + ' • ' + spec)
                                )
                            ),
                            e('div', {className: 'w-full bg-gray-300 rounded-full h-2 mb-2'},
                                e('div', {className: 'bg-indigo-600 h-2 rounded-full', style: {width: progress + '%'}})
                            ),
                            e('p', {className: 'text-xs text-gray-600'}, evaluated + '/' + total + ' (' + progress + '%)')
                        ),
                        e('div', {className: 'bg-white rounded-lg shadow-lg p-6 mb-6'},
                            e('h3', {className: 'font-bold text-lg mb-3'}, 'Question'),
                            e('p', {className: 'text-gray-800 whitespace-pre-wrap text-base'}, q.question)
                        ),
                        e('div', {className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6'},
                            q.models.map(function(m, mi) {
                                var rData = (qRating.responses && qRating.responses[mi]) || {};
                                return e('div', {key: m.letter, className: 'bg-white rounded-lg shadow-lg p-4 border-2 border-gray-200 flex flex-col'},
                                    e('h4', {className: 'font-bold text-lg mb-3 text-center bg-gray-100 py-2 rounded'}, 'Response ' + m.letter),
                                    e('div', {className: 'bg-gray-50 rounded p-3 text-sm text-gray-800 whitespace-pre-wrap mb-4 flex-grow min-h-32 max-h-64 overflow-y-auto'}, m.text),
                                    e('div', {className: 'space-y-2 mt-auto'},
                                        dims.map(function(d) {
                                            return e('div', {key: d},
                                                e('label', {className: 'text-xs font-bold text-gray-700 block mb-1'}, d.charAt(0).toUpperCase() + d.slice(1)),
                                                e('select', {
                                                    value: rData[d] || '',
                                                    onChange: function(e) { save(mi, d, e.target.value); },
                                                    className: 'w-full px-2 py-1 border border-gray-300 rounded text-sm'
                                                },
                                                    e('option', {value: ''}, '—'),
                                                    [1, 2, 3, 4, 5].map(function(s) {
                                                        return e('option', {key: s, value: s}, s + ' - ' + ratingLabels[d][s - 1]);
                                                    })
                                                )
                                            );
                                        })
                                    )
                                );
                            })
                        ),
                        e('div', {className: 'bg-white rounded-lg shadow-lg p-6 mb-6'},
                            e('h3', {className: 'font-bold text-lg mb-4'}, 'Which Response is Best?'),
                            e('div', {className: 'grid grid-cols-4 gap-2 mb-6'},
                                ['A', 'B', 'C', 'D'].map(function(letter) {
                                    return e('button', {
                                        key: letter,
                                        onClick: function() { saveBest(letter); },
                                        className: 'py-3 rounded-lg font-bold text-lg transition ' + (qRating.best === letter ? 'bg-green-600 text-white' : 'bg-gray-200 text-gray-900 hover:bg-gray-300')
                                    }, letter);
                                })
                            ),
                            qRating.best ? e('div', {className: 'border-t pt-6'},
                                e('h3', {className: 'font-bold text-lg mb-4'}, '📝 Clinical Insights for Response ' + qRating.best + ' (Optional)'),
                                e('p', {className: 'text-sm text-gray-600 mb-3'}, 'Help us improve this response by sharing what you would include or avoid in your clinical practice:'),
                                React.createElement(VoiceRecorder, {
                                    value: qRating.clinicalNote || '',
                                    onChange: function(val) { saveClinicalNote(val); }
                                })
                            ) : null
                        ),
                        e('button', {onClick: isLast ? completeEval : next, disabled: loading, className: 'w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg mb-6 disabled:bg-gray-400'}, loading ? '⏳ Saving...' : (isLast ? '✓ Complete & Download' : 'Next Question →'))
                    )
                );
            }
            if (stage === 'complete') {
                var filename = spec + '_' + name + '_results.csv';
                return e('div', {className: 'min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6'},
                    e('div', {className: 'max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8'},
                        e('div', {className: 'text-center mb-8'},
                            e('h1', {className: 'text-4xl font-bold text-green-600 mb-2'}, '✓ Evaluation Complete!'),
                            e('p', {className: 'text-lg text-gray-700'}, 'Thank you for your thorough evaluation.')
                        ),
                        e('div', {className: 'bg-green-50 border-2 border-green-200 rounded-lg p-6 mb-6'},
                            e('h2', {className: 'font-bold text-lg text-gray-900 mb-2'}, '📥 Results Downloaded'),
                            e('p', {className: 'text-gray-800 font-mono bg-gray-100 p-3 rounded'}, filename),
                            e('p', {className: 'text-sm text-gray-600 mt-2'}, 'Your evaluation results have been downloaded to your computer.')
                        ),
                        e('div', {className: 'bg-blue-50 border-2 border-blue-200 rounded-lg p-6 mb-6'},
                            e('h2', {className: 'font-bold text-lg text-gray-900 mb-3'}, '📧 Next Steps'),
                            e('ol', {className: 'list-decimal list-inside space-y-2 text-gray-800'},
                                e('li', null, e('span', {className: 'font-bold'}, 'Email the downloaded file to: '), e('span', {className: 'font-mono text-blue-600'}, 'vshukla@uabmc.edu')),
                                e('li', null, e('span', {className: 'font-bold'}, 'Subject: '), e('span', null, spec + ' Evaluation Results - ' + name)),
                                e('li', null, 'Include your name and specialty in the email')
                            )
                        ),
                        e('button', {onClick: function() { setStage('setup'); setQIdx(0); setRatings({}); }, className: 'w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg'}, 'Start New Evaluation')
                    )
                );
            }
            return null;
        }
        ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
    </script>
</body>
</html>
