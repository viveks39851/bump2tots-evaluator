<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bump2Tots Evaluator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="app"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
        const e = React.createElement;
        const useState = React.useState;

        function App() {
            const [stage, setStage] = useState('setup');
            const [name, setName] = useState('');
            const [spec, setSpec] = useState('');
            const [questions, setQuestions] = useState(null);
            const [qIdx, setQIdx] = useState(0);
            const [mIdx, setMIdx] = useState(0);
            const [ratings, setRatings] = useState({});

            function parseCSV(line) {
                var cells = [];
                var current = '';
                var inQuotes = false;
                for (var i = 0; i < line.length; i++) {
                    var c = line[i];
                    if (c === '"') {
                        inQuotes = !inQuotes;
                    } else if (c === ',' && !inQuotes) {
                        cells.push(current.trim().replace(/^"(.*)"$/, '$1'));
                        current = '';
                    } else {
                        current += c;
                    }
                }
                cells.push(current.trim().replace(/^"(.*)"$/, '$1'));
                return cells;
            }

            function handleUpload(ev) {
                var file = ev.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = function(e2) {
                    var csv = e2.target.result;
                    var lines = csv.split('\n').filter(function(l) { return l.trim(); });
                    var header = lines[0].split(',').map(function(h) { return h.trim(); });

                    var qIdx = -1, sIdx = -1, gIdx = -1, geIdx = -1, cIdx = -1, bIdx = -1;
                    for (var i = 0; i < header.length; i++) {
                        var h = header[i].toLowerCase();
                        if (h.includes('question')) qIdx = i;
                        if (h.includes('speciality')) sIdx = i;
                        if (h.includes('gpt')) gIdx = i;
                        if (h.includes('gemini')) geIdx = i;
                        if (h.includes('claude')) cIdx = i;
                        if (h.includes('bump2tots')) bIdx = i;
                    }

                    if (qIdx < 0 || sIdx < 0 || gIdx < 0 || geIdx < 0 || cIdx < 0 || bIdx < 0) {
                        alert('Missing columns');
                        return;
                    }

                    var parsed = lines.slice(1).map(function(line, idx) {
                        var cells = parseCSV(line);
                        var models = [
                            { name: 'ChatGPT', text: cells[gIdx] || '' },
                            { name: 'Gemini', text: cells[geIdx] || '' },
                            { name: 'Claude', text: cells[cIdx] || '' },
                            { name: 'Bump2Tots', text: cells[bIdx] || '' }
                        ];
                        models.sort(function() { return Math.random() - 0.5; });
                        return {
                            qNum: idx + 1,
                            question: cells[qIdx] || '',
                            spec: cells[sIdx] || '',
                            models: models.map(function(m, i) {
                                return {
                                    letter: String.fromCharCode(65 + i),
                                    name: m.name,
                                    text: m.text
                                };
                            })
                        };
                    });
                    setQuestions(parsed);
                };
                reader.readAsText(file);
            }

            if (stage === 'setup') {
                var specs = ['OB/MFM', 'Peds/Neo'];
                return e('div', {className: 'min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6'},
                    e('div', {className: 'max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8'},
                        e('h1', {className: 'text-3xl font-bold text-gray-900 mb-6'}, 'Bump2Tots Evaluator'),
                        !questions ? 
                            e('label', {className: 'block'},
                                e('div', {className: 'bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg cursor-pointer text-center'}, '📁 Upload CSV'),
                                e('input', {type: 'file', accept: '.csv', onChange: handleUpload, className: 'hidden'})
                            )
                        :
                            e('div', {className: 'space-y-6'},
                                e('div', null,
                                    e('label', {className: 'block text-sm font-bold text-gray-900 mb-2'}, 'Your Name'),
                                    e('input', {type: 'text', placeholder: 'Dr. Name', value: name, onChange: function(e) { setName(e.target.value); }, className: 'w-full px-4 py-2 border border-gray-300 rounded-lg'})
                                ),
                                e('div', null,
                                    e('label', {className: 'block text-sm font-bold text-gray-900 mb-3'}, 'Specialty'),
                                    specs.map(function(s) {
                                        var count = questions.filter(function(q) { return (s === 'OB/MFM' && q.spec === 'OB/MFM') || (s === 'Peds/Neo' && (q.spec === 'Peds/Neo' || q.spec === 'peds/neo')); }).length;
                                        return e('button', {key: s, onClick: function() { setSpec(s); }, className: 'w-full py-2 px-4 mb-2 rounded-lg font-bold ' + (spec === s ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-900')}, s + ' (' + count + ')');
                                    })
                                ),
                                e('button', {onClick: function() { if (name && spec) setStage('eval'); else alert('Please enter info'); }, className: 'w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg'}, 'Start')
                            )
                    )
                );
            }

            if (stage === 'eval' && questions) {
                var filtered = questions.filter(function(q) { return (spec === 'OB/MFM' && q.spec === 'OB/MFM') || (spec === 'Peds/Neo' && (q.spec === 'Peds/Neo' || q.spec === 'peds/neo')); });
                if (filtered.length === 0) {
                    return e('div', {className: 'min-h-screen flex items-center justify-center'}, e('div', {className: 'text-2xl font-bold'}, 'No questions found'));
                }

                var q = filtered[qIdx];
                var m = q.models[mIdx];
                var key = qIdx + '_' + mIdx;
                var rating = ratings[key] || {};

                function next() {
                    if (mIdx < 3) setMIdx(mIdx + 1);
                    else if (qIdx < filtered.length - 1) {
                        setQIdx(qIdx + 1);
                        setMIdx(0);
                    }
                }

                function save(dim, val) {
                    var newRatings = Object.assign({}, ratings);
                    newRatings[key] = Object.assign({}, ratings[key], {});
                    newRatings[key][dim] = val;
                    setRatings(newRatings);
                }

                function exportCSV() {
                    var rows = [];
                    filtered.forEach(function(q, qi) {
                        q.models.forEach(function(m, mi) {
                            var r = ratings[qi + '_' + mi] || {};
                            rows.push([name, spec, q.qNum, '"' + q.question + '"', m.name, r.accuracy || '', r.clarity || '', r.safety || '', r.actionability || '', r.empathy || '', r.winner ? 'Yes' : 'No']);
                        });
                    });
                    var header = ['Evaluator', 'Specialty', 'Question#', 'Question', 'Model', 'Accuracy', 'Clarity', 'Safety', 'Actionability', 'Empathy', 'Winner'];
                    var csv = [header].concat(rows).map(function(r) { return r.join(','); }).join('\n');
                    var blob = new Blob([csv], {type: 'text/csv'});
                    var url = URL.createObjectURL(blob);
                    var a = document.createElement('a');
                    a.href = url;
                    a.download = spec + '_' + name + '_results.csv';
                    a.click();
                }

                var isLast = qIdx === filtered.length - 1 && mIdx === 3;
                var total = filtered.length * 4;
                var evaluated = Object.keys(ratings).length;
                var progress = Math.round((evaluated / total) * 100);

                var dims = ['accuracy', 'clarity', 'safety', 'actionability', 'empathy'];

                return e('div', {className: 'min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6'},
                    e('div', {className: 'max-w-3xl mx-auto'},
                        e('div', {className: 'bg-white rounded-lg shadow-lg p-6 mb-6'},
                            e('div', {className: 'flex justify-between mb-4'},
                                e('div', null,
                                    e('h2', {className: 'text-2xl font-bold text-gray-900'}, 'Q' + (qIdx + 1) + '/' + filtered.length + ' • R' + (mIdx + 1) + '/4'),
                                    e('p', {className: 'text-sm text-gray-600'}, name + ' • ' + spec)
                                ),
                                isLast ? e('button', {onClick: exportCSV, className: 'bg-green-600 text-white font-bold py-2 px-4 rounded'}, '📥 Export') : null
                            ),
                            e('div', {className: 'w-full bg-gray-300 rounded-full h-2 mb-2'},
                                e('div', {className: 'bg-indigo-600 h-2 rounded-full', style: {width: progress + '%'}})
                            ),
                            e('p', {className: 'text-xs text-gray-600'}, evaluated + '/' + total + ' (' + progress + '%)')
                        ),
                        e('div', {className: 'bg-white rounded-lg shadow-lg p-6 mb-6'},
                            e('h3', {className: 'font-bold text-lg mb-3'}, 'Question'),
                            e('p', {className: 'text-gray-800'}, q.question)
                        ),
                        e('div', {className: 'bg-white rounded-lg shadow-lg p-6 mb-6'},
                            e('h3', {className: 'font-bold text-lg mb-4'}, 'Response ' + m.letter),
                            e('div', {className: 'bg-gray-50 border border-gray-200 rounded p-4 max-h-80 overflow-y-auto text-sm text-gray-800'}, m.text)
                        ),
                        e('div', {className: 'bg-white rounded-lg shadow-lg p-6 mb-6'},
                            e('h3', {className: 'font-bold text-lg mb-6'}, 'Rate This Response'),
                            dims.map(function(d) {
                                return e('div', {key: d, className: 'mb-4'},
                                    e('label', {className: 'text-sm font-bold text-gray-900 block mb-2'}, d.charAt(0).toUpperCase() + d.slice(1)),
                                    e('div', {className: 'flex gap-2'},
                                        [1, 2, 3, 4, 5].map(function(s) {
                                            return e('button', {key: s, onClick: function() { save(d, s); }, className: 'flex-1 py-2 rounded font-bold ' + (rating[d] === s ? 'bg-indigo-600 text-white' : 'bg-gray-200')}, s);
                                        })
                                    )
                                );
                            }),
                            e('div', {className: 'mt-4 pt-4 border-t'},
                                e('label', {className: 'flex items-center gap-2'},
                                    e('input', {type: 'checkbox', checked: rating.winner || false, onChange: function(e) { save('winner', e.target.checked); }}),
                                    e('span', {className: 'font-bold'}, 'Mark as overall winner')
                                )
                            )
                        ),
                        e('button', {onClick: isLast ? exportCSV : next, className: 'w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg'}, isLast ? '✓ Export Results' : 'Next →')
                    )
                );
            }

            return null;
        }

        ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
    </script>
</body>
</html>
